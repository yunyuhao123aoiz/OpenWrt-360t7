name: Build Custom Packages

on:
  workflow_call:
    # 无输入参数，自包含

jobs:
  build-packages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🛬 Checkout Repository
        uses: actions/checkout@v6

      - name: 📖 Read Configuration
        id: config
        run: |
          # 读取设备配置（假设第一个设备，或直接指定 qihoo_360t7）
          DEVICE_CONFIG="build/qihoo_360t7/config.sh"
          if [ ! -f "$DEVICE_CONFIG" ]; then
            echo "::error::Device config not found: $DEVICE_CONFIG"
            exit 1
          fi
          source "$DEVICE_CONFIG"
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "arch=$arch" >> $GITHUB_OUTPUT
          echo "targets=$targets" >> $GITHUB_OUTPUT

          # 读取包列表
          PACKAGE_CONFIG="build/package/config.sh"
          if [ ! -f "$PACKAGE_CONFIG" ]; then
            echo "::error::Package config not found: $PACKAGE_CONFIG"
            exit 1
          fi
          source "$PACKAGE_CONFIG"
          echo "packages=$PACKAGES_TO_BUILD" >> $GITHUB_OUTPUT

      - name: 🔧 Setup Build Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential libncurses5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc wget unzip python3 jq zstd axel coreutils openssl rhash curl
          sudo apt-get install -y libncursesw5-dev genisoimage xsltproc rsync

      - name: 📥 Download SDK
        id: download-sdk
        run: |
          VERSION="${{ steps.config.outputs.version }}"
          TARGETS="${{ steps.config.outputs.targets }}"
          SANITIZED_TARGET="${TARGETS//\//-}"
          BASE_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/${TARGETS}"
          
          URLS=(
            "${BASE_URL}/immortalwrt-sdk-${VERSION}-${SANITIZED_TARGET}.Linux-x86_64.tar.zst"
            "${BASE_URL}/immortalwrt-sdk-${SANITIZED_TARGET}.Linux-x86_64.tar.zst"
            "${BASE_URL}/immortalwrt-sdk-${VERSION}-${SANITIZED_TARGET}.Linux-x86_64.tar.xz"
            "${BASE_URL}/immortalwrt-sdk-${SANITIZED_TARGET}.Linux-x86_64.tar.xz"
          )
          
          mkdir -p sdk_tmp
          FOUND=0
          for URL in "${URLS[@]}"; do
            echo "🔍 Testing: $URL"
            if curl -Ls --connect-timeout 10 --max-time 30 --head "$URL" -w "%{http_code}" -o /dev/null | grep -q "200"; then
              echo "✅ Found SDK at: $URL"
              echo "🚀 Downloading with axel..."
              if axel -n 64 -o sdk_tmp/sdk.tar.zst "$URL"; then
                FILESIZE=$(stat -c%s "sdk_tmp/sdk.tar.zst")
                if [ "$FILESIZE" -gt 1000000 ]; then
                  FOUND=1
                  break
                fi
              fi
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "::error::SDK not found"
            exit 1
          fi
          echo "✅ SDK downloaded"

      - name: 📦 Extract SDK
        run: |
          mkdir -p extract_tmp
          cd extract_tmp
          if file "$OLDPWD/sdk_tmp/sdk.tar.zst" | grep -q "Zstandard"; then
            tar -I zstd -xf "$OLDPWD/sdk_tmp/sdk.tar.zst"
          elif file "$OLDPWD/sdk_tmp/sdk.tar.zst" | grep -q "XZ"; then
            tar -xJf "$OLDPWD/sdk_tmp/sdk.tar.zst"
          else
            tar -xf "$OLDPWD/sdk_tmp/sdk.tar.zst"
          fi
          mv immortalwrt-sdk-* ../sdk
          cd ..
          rm -rf extract_tmp sdk_tmp
          echo "✅ SDK extracted"

      - name: 📦 Add Custom Feeds
        run: |
          cd sdk
          # 添加自定义 feed（可根据需要追加更多）
          echo "src-git timecontrol https://github.com/TimouL/luci-app-timecontrol.git" >> feeds.conf.default
          # 如果还有其他 feed，在这里添加
          # echo "src-git openclash https://github.com/vernesong/OpenClash.git" >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🔨 Compile Packages
        run: |
          cd sdk
          PACKAGES="${{ steps.config.outputs.packages }}"
          for PKG in $PACKAGES; do
            echo "🔨 Building package: $PKG"
            make package/$PKG/compile V=s || {
              echo "::error::Failed to build $PKG"
              exit 1
            }
          done

      - name: 📦 Collect IPK Files
        run: |
          mkdir -p ipk_output
          find sdk/bin -name "*.ipk" -exec cp {} ipk_output/ \;
          echo "✅ Collected $(ls ipk_output/*.ipk 2>/dev/null | wc -l) packages"

      - name: 🗑️ Delete Old Package Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG="${{ steps.config.outputs.version }}-${{ steps.config.outputs.arch }}-packages"
          if gh release view "$RELEASE_TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "🗑️ Deleting old package release: $RELEASE_TAG"
            gh release delete "$RELEASE_TAG" --repo "${{ github.repository }}" --yes
          fi
          if git rev-parse "$RELEASE_TAG" &>/dev/null; then
            git tag -d "$RELEASE_TAG"
            git push --delete origin "$RELEASE_TAG" 2>/dev/null || true
          fi

      - name: 🚀 Upload Packages to Release
        uses: softprops/action-gh-release@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: ipk_output/*.ipk
          tag_name: ${{ steps.config.outputs.version }}-${{ steps.config.outputs.arch }}-packages
          name: 📦 ${{ steps.config.outputs.version }} ${{ steps.config.outputs.arch }} Packages
          body: |
            **Pre-compiled packages for ${{ steps.config.outputs.arch }}**
            Built from feeds at commit ${{ github.sha }}
          draft: false
          prerelease: false
